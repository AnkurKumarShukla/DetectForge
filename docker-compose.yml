services:
  detectforge:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - detectforge_db:/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////data/detectforge.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  detectforge_db:
