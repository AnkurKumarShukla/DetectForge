services:
  detectforge:
    image: shuklaankur/detectforge:latest   # pre-built image from Docker Hub
    build:                                   # fallback: rebuild locally
      context: .
      dockerfile: Dockerfile
    container_name: detectforge
    ports:
      - "8077:8077"
    volumes:
      - detectforge_db:/data                 # persists SQLite across restarts
    env_file:
      - .env                                 # copy .env.example → .env and fill in creds
    environment:
      - DATABASE_URL=sqlite:////data/detectforge.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8077/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  detectforge_db:
    driver: local
